name: live_tv
description: "LVS Live TV Mobile Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_android_video: ^1.3.0
  wakelock_plus: ^1.4.0
  cached_network_image: ^3.4.1
  http: ^1.6.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  media_kit_libs_linux: any
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  audio_session: ^0.2.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/

